name: Deploy to Steam Workshop

on:
  push:
    tags:
      - 'v*.*.*' # Run only when creating tags like v1.0.0

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Publish to Steam Workshop
        uses: vurvdev/gmod-upload@master
        with:
          id: '1620191091'
          config: 'addon.json'
          changelog: "New release published via GitHub Actions. Version ${{ github.ref_name }}. See changes: https://github.com/thegamerbay/gmod-rotating-third-person/releases/tag/${{ github.ref_name }}"
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
