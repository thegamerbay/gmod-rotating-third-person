name: Lint

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Lua
        uses: leafo/gh-actions-lua@v13.0.0
        with:
          luaVersion: "5.1.5"

      - name: Setup Luarocks
        uses: leafo/gh-actions-luarocks@v6.0.0

      - name: Install Luacheck
        run: luarocks install luacheck

      - name: Run Luacheck
        run: luacheck lua/ spec/
