# องค์ประกอบ UI
rtp_ui_cam_distance=ระยะห่างมุมกล้อง:
rtp_ui_cam_up=ความสูงมุมกล้อง:
rtp_ui_crouch_drop=ระดับกล้องที่ลดลงขณะหมอบ:
rtp_ui_cam_right=การเลื่อนแนวนอน:
rtp_ui_cam_fov=ขอบเขตการมองเห็น (FOV):
rtp_ui_zoom_fov=ระดับการซูมขณะเล็ง:
rtp_ui_aiming_btn=ปุ่มเล็งเป้า:
rtp_ui_sens_mult=ความไวกล้อง:
rtp_ui_hide_crosshair=ซ่อนเป้าเล็งเมื่อไม่ได้เล็ง
rtp_ui_trace_crosshair=เป้าเล็ง 3 มิติแบบไดนามิก
rtp_ui_crosshair_size=ขนาดเป้าเล็ง:
rtp_ui_crosshair_color=สีเป้าเล็ง:
rtp_ui_toggle_aim=คลิกเพื่อเล็ง (Toggle)
rtp_ui_smart_scope=เล็งอัจฉริยะ (ปิดใช้งานสไนเปอร์)
rtp_ui_invert_y=สลับแกน Y
rtp_ui_classic_mode=การเคลื่อนไหวแบบคลาสสิก (ยึดตามกล้อง)
rtp_ui_reset_btn=รีเซ็ตการตั้งค่า
rtp_ui_enable_btn=เปิดใช้มุมมองบุคคลที่สาม
rtp_ui_disable_btn=ปิดมุมมองบุคคลที่สาม

# คำอธิบาย
rtp_tip_cam_distance=ควบคุมระยะห่างของกล้องจากด้านหลังของตัวละคร
rtp_tip_cam_up=ปรับระดับความสูงของกล้องเหนือหรือต่ำกว่าระดับไหล่ของตัวละคร
rtp_tip_crouch_drop=กล้องจะลดระดับลงเท่าใดเมื่อผู้เล่นหมอบ (0 = ไม่ลดลง)
rtp_tip_cam_right=เลื่อนตำแหน่งกล้องไปทางซ้ายหรือขวาจากจุดกึ่งกลางของตัวละคร
rtp_tip_cam_fov=กำหนดความกว้างของขอบเขตการมองเห็นทั้งหมดในมุมมองบุคคลที่สาม
rtp_tip_zoom_fov=ระบุความแรงของการซูมหน้าจอเมื่อผู้เล่นกดปุ่มเล็งปืน
rtp_tip_aiming_btn=ใช้กำหนดปุ่มเมาส์หรือคีย์บอร์ดที่ผู้เล่นใช้สำหรับเล็งปืนแบบแม่นยำ
rtp_tip_sens_mult=ตัวคูณความเร็วกล้อง (1 = ค่าเริ่มต้น, < 1 ช้าลง, > 1 เร็วขึ้น)
rtp_tip_hide_crosshair=ลบเป้าเล็งเริ่มต้นออกจากกลางหน้าจอหากคุณไม่ได้กำลังเล็งปืนอยู่
rtp_tip_trace_crosshair=วาดเป้าเล็งสมจริงที่แสดงตำแหน่งที่กระสุนจะตกกระทบจริงๆ ในโลก 3 มิติโดยคำนวณจากสิ่งกีดขวาง
rtp_tip_crosshair_size=ปรับขนาด (ความยาว) ของเป้าเล็งแบบไดนามิกที่กำหนดเอง
rtp_tip_crosshair_color=ปรับสีและความทึบของเป้าเล็งแบบไดนามิกที่กำหนดเอง
rtp_tip_toggle_aim=คุณไม่ต้องกดปุ่มค้างไว้ แค่คลิกหนึ่งครั้งเพื่อเล็ง และคลิกอีกครั้งเพื่อเลิกเล็ง
rtp_tip_smart_scope=ป้องกันปัญหามุมกล้องเมื่อใช้กล้องสไนเปอร์ โดยการสลับเป็นมุมมองบุคคลที่หนึ่งชั่วคราวขณะเล็ง
rtp_tip_invert_y=กลับทิศทางการควบคุมกล้องในแนวตั้ง (เลื่อนเมาส์ขึ้นคือการก้มลง) เหมือนในเกมจำลองเครื่องบิน
rtp_tip_classic_mode=ล็อกทิศทางให้ตัวละครของคุณหันหน้าและเล็งไปในทิศทางเดียวกับที่กล้องกำลังหันไปเสมอ
