# Suggerimenti (Tooltips)
rtp_tip_cam_distance=Stabilisce la lontananza della telecamera dalle spalle del tuo personaggio.
rtp_tip_cam_up=Modifica l'altezza della telecamera posizionandola sopra o a livello del giocatore.
rtp_tip_crouch_drop=Di quanto si abbassa la telecamera quando il giocatore è accovacciato. (0 = nessun abbassamento)
rtp_tip_cam_right=Posiziona la visuale più sul lato sinistro o destro rispetto alla schiena.
rtp_tip_cam_fov=Regola l'ampiezza generale della visuale in terza persona.
rtp_tip_zoom_fov=Determina l'intensità di ingrandimento visivo quando premi il tasto di mira.
rtp_tip_aiming_btn=Assegna il tasto o clicca il pulsante del mouse utilizzato per mirare di precisione.
rtp_tip_sens_mult=Moltiplicatore velocità fotocamera (1 = predefinito, < 1 più lento, > 1 più veloce).
rtp_tip_hide_crosshair=Rimuove il mirino standard dallo schermo quando l'arma non è in posizione di tiro.
rtp_tip_trace_crosshair=Mostra un punto di impatto reale nel mondo 3D, tenendo conto degli ostacoli fisici.
rtp_tip_crosshair_size=Regola la dimensione (lunghezza) del mirino dinamico personalizzato.
rtp_tip_crosshair_color=Regola il colore e l'opacità del mirino dinamico personalizzato.
rtp_tip_toggle_aim=Permette di mirare cliccando una volta, senza dover tenere premuto il tasto.
rtp_tip_smart_scope=Torna istantaneamente in prima persona quando utilizzi armi con mirino da cecchino.
rtp_tip_invert_y=Capovolge i comandi verticali della telecamera (es. muovi in alto e guarda in basso).
rtp_tip_classic_mode=Collega il modello fisico del personaggio all'orientamento costante della telecamera.
rtp_tip_aim_rot_speed=Fluidità della rotazione del personaggio durante la mira.
rtp_tip_transition_speed=Velocità del volo cinematografico della telecamera. Imposta a 0 per il cambio istantaneo.
rtp_tip_block_attack2=Impedisce di sparare l'attacco secondario dell'arma mentre si mira in terza persona. Disattiva questa opzione se la mira rompe basi di armi personalizzate come ARC9.
