# UI要素
rtp_ui_cam_distance=カメラの距離:
rtp_ui_cam_up=カメラの高さ:
rtp_ui_cam_right=カメラの水平オフセット:
rtp_ui_cam_fov=視野角(FOV):
rtp_ui_zoom_fov=エイム時ズーム度:
rtp_ui_aiming_btn=エイムボタン:
rtp_ui_sens_mult=カメラ感度:
rtp_ui_hide_crosshair=エイムしていない時はクロスヘアを隠す
rtp_ui_trace_crosshair=動的3Dクロスヘア（着弾点表示）
rtp_ui_toggle_aim=エイムの切り替え（トグル）
rtp_ui_smart_scope=スマートスコープ (スナイパー用1人称自動切替)
rtp_ui_invert_y=Y軸を反転する
rtp_ui_classic_mode=クラシック操作モード (カメラと体の向きを固定)
rtp_ui_reset_btn=設定をリセット
rtp_ui_enable_btn=サードパーソンを有効化
rtp_ui_disable_btn=サードパーソンを無効化

# ツールチップ
rtp_tip_cam_distance=キャラクターの背中からカメラがどのくらい離れるかを調整します。
rtp_tip_cam_up=キャラクターの肩から見て、カメラの上下の位置を決めます。
rtp_tip_cam_right=キャラクターの左肩・右肩に対して、カメラを左右にオフセットします。
rtp_tip_cam_fov=三人称視点全体での視界の広さを設定します。
rtp_tip_zoom_fov=エイム操作をした際の、画面のズーム強度（FOVの減算値）を指定します。
rtp_tip_aiming_btn=武器を構えるために使用するマウスやキーボードのボタンを割り当てます。
rtp_tip_sens_mult=カメラ速度の乗数 (1 = デフォルト、< 1 で遅く、> 1 で速く)。
rtp_tip_hide_crosshair=狙いをつけていない間、画面上から標準のクロスヘアを消去します。
rtp_tip_trace_crosshair=障害物の影響などを計算した、実際の弾丸命中予測地点を画面に描画します。
rtp_tip_toggle_aim=ボタンを押し続ける代わりに、1回押すだけでエイム状態を維持・解除できるようになります。
rtp_tip_smart_scope=スナイパーライフルなど高倍率スコープを覗いた時にモデルが邪魔にならないよう、自動でFPS視点にします。
rtp_tip_invert_y=マウスを上下に動かす際、視点の動きを通常とは逆に反転させます（フライトシミュレーター向け）。
rtp_tip_classic_mode=カメラが向いている方向に常にキャラクターの体が向くようになる、伝統的なアクションTPSの操作感になります。
