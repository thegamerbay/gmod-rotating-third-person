# Tooltips
rtp_tip_cam_distance=Controls the camera's distance from the player.
rtp_tip_cam_up=Controls the camera's vertical offset from the player.
rtp_tip_cam_right=Controls the camera's horizontal offset from the player.
rtp_tip_cam_fov=Sets the target Field of View for the camera.
rtp_tip_zoom_fov=How much FOV to subtract when aiming.
rtp_tip_aiming_btn=Mouse/Keyboard keycode for the aim button.
rtp_tip_sens_mult=Camera speed multiplier (1 = default, < 1 slower, > 1 faster).
rtp_tip_hide_crosshair=Hides the default crosshair while not aiming.
rtp_tip_trace_crosshair=Draws a custom dynamic crosshair showing true bullet trajectory.
rtp_tip_toggle_aim=If 1, clicking the aim button toggles the aiming state.
rtp_tip_smart_scope=Automatically disables third-person when zooming in (FOV < 50).
rtp_tip_invert_y=Inverts the vertical mouse pitch rotation.
rtp_tip_classic_mode=Enables Classic movement mode: locks model rotation to camera direction.
