rtp_ui_cam_distance=Distancia de la cámara:
rtp_ui_cam_up=Altura de la cámara:
rtp_ui_crouch_drop=Descenso de cámara al agacharse:
rtp_ui_cam_right=Desplazamiento horizontal:
rtp_ui_cam_fov=Campo de visión:
rtp_ui_zoom_fov=Magnitud de zoom:
rtp_ui_aiming_btn=Botón de apuntar:
rtp_ui_sens_mult=Sensibilidad de la cámara:
rtp_ui_hide_crosshair=Ocultar mira sin apuntar
rtp_ui_trace_crosshair=Mira 3D dinámica
rtp_ui_crosshair_size=Tamaño de la mira:
rtp_ui_crosshair_color=Color de la mira:
rtp_ui_toggle_aim=Apuntar con un clic (Alternar)
rtp_ui_smart_scope=Mira inteligente (desactivada en francotiradores)
