# Verktygstips
rtp_tip_cam_distance=Kontrollerar hur långt bak från karaktärens rygg kameran befinner sig.
rtp_tip_cam_up=Justerar kamerans höjd över eller under spelarens axlar.
rtp_tip_cam_right=Förskjuter kamerans placering till vänster eller höger i förhållande till spelarens centrum.
rtp_tip_cam_fov=Ställer in grundbredden för ditt övergripande synfält.
rtp_tip_zoom_fov=Anger hur mycket inzoomning som appliceras när siktknappen hålls in.
rtp_tip_aiming_btn=Bestämmer vilken knapp (mus eller tangentbord) som aktiverar precisionssiktet.
rtp_tip_sens_mult=Kamerahastighetsmultiplikator (1 = standard, < 1 långsammare, > 1 snabbare).
rtp_tip_hide_crosshair=Döljer standardsiktet så länge vapnet vilar och du inte aktivt siktar.
rtp_tip_trace_crosshair=Ritar upp en realistisk indikator som visar var skottet faktiskt kommer att landa i 3D-världen.
rtp_tip_toggle_aim=Gör att du slipper hålla in knappen; ett enda klick slår på siktet, ett till klick stänger av det.
rtp_tip_smart_scope=Ett smart läge som tvingar spelet till förstaperson när du tittar i ett kikarsikte för enklare sniping.
rtp_tip_smart_scope_threshold=Ställer in FOV-tröskelvärdet under vilket Smart Scope automatiskt byter till förstaperson.
rtp_tip_invert_y=Vänder upp/ner-styrningen på sin spets, vilket ofta föredras av flygspelsfantaster.
rtp_tip_classic_mode=Låser spelarkaraktärens rörelseriktning så att kroppen alltid pekar dit kameran tittar.
