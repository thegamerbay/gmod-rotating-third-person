# UI 요소
rtp_ui_cam_distance=카메라 거리:
rtp_ui_cam_up=카메라 높이:
rtp_ui_cam_right=카메라 수평 오프셋:
rtp_ui_cam_fov=시야각 (FOV):
rtp_ui_zoom_fov=조준 확대 배율:
rtp_ui_aiming_btn=조준 버튼:
rtp_ui_sens_mult=카메라 감도:
rtp_ui_hide_crosshair=조준하지 않을 때 조준선 숨기기
rtp_ui_trace_crosshair=동적 3D 조준선 (실제 탄착군)
rtp_ui_toggle_aim=클릭하여 조준 (토글 방식)
rtp_ui_smart_scope=스마트 스코프 (저격 시 1인칭으로 전환)
rtp_ui_invert_y=Y축 반전
rtp_ui_classic_mode=클래식 이동 모드 (카메라 시점에 고정)
rtp_ui_reset_btn=설정 초기화
rtp_ui_enable_btn=3인칭 활성화
rtp_ui_disable_btn=3인칭 비활성화

# 툴팁
rtp_tip_cam_distance=캐릭터의 등뼈를 기준으로 카메라가 얼마나 멀리 떨어질지 제어합니다.
rtp_tip_cam_up=어깨선 위 또는 아래로 카메라의 수직 위치를 조정합니다.
rtp_tip_cam_right=카메라가 캐릭터의 왼쪽 혹은 오른쪽을 비추도록 시점을 이동시킵니다.
rtp_tip_cam_fov=3인칭 모드에서 화면에 보이는 전체적인 뷰의 넓이를 지정합니다.
rtp_tip_zoom_fov=조준 버튼을 눌렀을 때 화면이 줌인 조밀도를 결정합니다.
rtp_tip_aiming_btn=정밀 조준을 활성화하기 위해 누를 마우스나 키보드 단추를 등록합니다.
rtp_tip_sens_mult=카메라 속도 승수 (1 = 기본값, < 1 더 느림, > 1 더 빠름).
rtp_tip_hide_crosshair=총을 쏘지 않는 평상시 화면의 기본 십자선을 보이지 않게 꺼버립니다.
rtp_tip_trace_crosshair=단순한 화면 정중앙이 아닌, 지형의 높낮이를 반영해 총알이 맞을 실제 3D 좌표를 십자선으로 띄웁니다.
rtp_tip_toggle_aim=버튼을 길게 누르는 대신 한 번 클릭으로 조준을 켜고, 다시 눌러 해제하게 만듭니다.
rtp_tip_smart_scope=고배율 저격총의 줌 기능을 쓸 때 플레이어 몸이 화면을 가리는 현상을 막기 위해 1인칭 시점으로 바로 들어갑니다.
rtp_tip_invert_y=마우스를 위아래로 움직일 때 카메라 회전 방향을 거꾸로 바꿉니다(비행 시뮬레이터 조작법).
rtp_tip_classic_mode=캐릭터의 몸체가 항상 카메라가 보는 중심 방향으로 같이 회전하는 전통적 조작법을 가동합니다.
