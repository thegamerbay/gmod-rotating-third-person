rtp_ui_cam_distance=Khoảng cách Camera:
rtp_ui_cam_up=Độ cao Camera:
rtp_ui_cam_right=Dịch chuyển ngang:
rtp_ui_cam_fov=Góc nhìn (FOV):
rtp_ui_zoom_fov=Mức thu phóng khi nhắm:
rtp_ui_aiming_btn=Nút ngắm:
rtp_ui_sens_mult=Độ nhạy Camera:
rtp_ui_hide_crosshair=Ẩn hồng tâm khi không ngắm bắn
rtp_ui_trace_crosshair=Hồng tâm 3D động
rtp_ui_crosshair_size=Kích thước tâm ngắm:
rtp_ui_crosshair_color=Màu tâm ngắm:
rtp_ui_toggle_aim=Nhấp để ngắm (Bật/Tắt)
rtp_ui_smart_scope=Ngắm thông minh (tắt cho súng ngắm)
rtp_ui_smart_scope_threshold=Ngưỡng FOV cho Smart Scope:
