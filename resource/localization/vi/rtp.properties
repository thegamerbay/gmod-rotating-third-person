rtp_ui_enable_btn=Bật góc nhìn thứ ba
rtp_ui_disable_btn=Tắt góc nhìn thứ ba

# Mẹo hướng dẫn
rtp_tip_cam_distance=Điều chỉnh khoảng cách của camera ở phía sau lưng nhân vật xa hay gần.
rtp_tip_cam_up=Thay đổi độ cao của camera để chỉnh điểm nhìn lên cao hoặc ngang vai nhân vật.
rtp_tip_cam_right=Dịch chuyển camera sang bên trái hoặc bên phải so với trục trung tâm của người chơi.
rtp_tip_cam_fov=Thay đổi độ rộng của tầm bao quát chung trong lúc ở góc nhìn thứ 3.
rtp_tip_zoom_fov=Mức độ thu phóng màn hình lại gần để giúp nhắm bắn rõ hơn.
rtp_tip_aiming_btn=Thiết lập phím trên chuột hoặc bàn phím dùng làm nút để nhắm bắn tiêu chuẩn.
rtp_tip_sens_mult=Hệ số nhân tốc độ camera (1 = mặc định, < 1 chậm hơn, > 1 nhanh hơn).
rtp_tip_hide_crosshair=Xóa bỏ vạch chữ thập mặc định trên màn hình nếu bạn đang thả lỏng vũ khí.
rtp_tip_trace_crosshair=Vẽ một điểm bắt tia rất chính xác, hiện thực nơi viên đạn thực sự va chạm trong không gian 3D.
rtp_tip_crosshair_size=Điều chỉnh kích thước (chiều dài) của tâm ngắm động tùy chỉnh.
rtp_tip_crosshair_color=Điều chỉnh màu sắc và độ mờ của tâm ngắm động tùy chỉnh.
rtp_tip_toggle_aim=Cho phép người chơi nhấp một lần để giữ chế độ ngắm, thay vì phải đè giữ nút liên tục.
rtp_tip_smart_scope=Lập tức đổi lại thành góc nhìn thứ nhất khi sử dụng ống ngắm tỉa để tránh việc bị che khuất tầm nhìn.
rtp_tip_smart_scope_threshold=Đặt ngưỡng FOV mà dưới mức đó Smart Scope sẽ tự động chuyển sang chế độ góc nhìn thứ nhất.
rtp_tip_invert_y=Đảo chiều khi đưa chuột lên hoặc xuống dành cho những người quen thao tác hệ thống giả lập máy bay.
rtp_tip_classic_mode=Luôn bắt buộc nhân vật phải xoay thân hình theo hướng camera khi di chuyển, thay vì quay độc lập.
