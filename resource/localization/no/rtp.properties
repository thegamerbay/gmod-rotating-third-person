# Verktøytips
rtp_tip_cam_distance=Bestemmer hvor langt bak karakterens rygg kameraet er plassert.
rtp_tip_cam_up=Justerer høyden på kameraet i forhold til spillerens skuldre.
rtp_tip_crouch_drop=Hvor mye kameraet senkes når spilleren sitter på huk. (0 = ingen senkning)
rtp_tip_cam_right=Forskyver kameravinkelen til høyre eller venstre side av spilleren.
rtp_tip_cam_fov=Stiller inn den generelle bredden på det visuelle synsfeltet i tredjeperson.
rtp_tip_zoom_fov=Bestemmer hvor kraftig skjermen zoomer inn når man holder nede sikteknappen.
rtp_tip_aiming_btn=Tildeler muse- eller tastaturknappen som skal brukes for å sikte nøyaktig.
rtp_tip_sens_mult=Kamerahastighetsmultiplikator (1 = standard, < 1 tregere, > 1 raskere).
rtp_tip_hide_crosshair=Fjerner det vanlige siktet fra midten av skjermen mens du ikke sikter med våpenet.
rtp_tip_trace_crosshair=Tegner et realistisk treffpunkt som viser nøyaktig hvor kulen treffer i 3D-verdenen, uansett hindringer.
rtp_tip_crosshair_size=Justerer størrelsen (lengden) på det tilpassede dynamiske siktet.
rtp_tip_crosshair_color=Justerer fargen og opasiteten til det tilpassede dynamiske siktet.
rtp_tip_toggle_aim=Gjør at du kan sikte med et enkelt klikk i stedet for å måtte holde knappen nede hele tiden.
rtp_tip_smart_scope=Bytter umiddelbart tilbake til førsteperson når du ser gjennom et snikskyttersikte for å unngå kamerakrøll.
rtp_tip_invert_y=Snur den vertikale styringen opp-ned, akkurat som styrespaken i et flysimulatorspill.
rtp_tip_classic_mode=Tvinger karakterens kropp til alltid å peke i samme retning som kameraet peker mot.
