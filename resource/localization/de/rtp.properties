# Tooltips
rtp_tip_cam_distance=Steuert, wie weit die Kamera hinter dem Charakter positioniert ist.
rtp_tip_cam_up=Ändert die Höhe der Kamera über oder unter der Schulter des Spielers.
rtp_tip_cam_right=Legt fest, ob die Kamera mehr über die linke oder rechte Schulter blickt.
rtp_tip_cam_fov=Bestimmt den allgemeinen Sichtwinkel der Kamera.
rtp_tip_zoom_fov=Legt fest, wie stark die Kamera heranzoomt, wenn die Waffe angelegt wird.
rtp_tip_aiming_btn=Die Taste (Maus oder Tastatur), die für das genaue Zielen gedrückt wird.
rtp_tip_sens_mult=Kamerageschwindigkeits-Multiplikator (1 = Standard, < 1 langsamer, > 1 schneller).
rtp_tip_hide_crosshair=Das standardmäßige Fadenkreuz verschwindet, wenn nicht aktiv gezielt wird.
rtp_tip_trace_crosshair=Zeigt in Echtzeit an, wo die Kugel im dreidimensionalen Raum einschlagen wird.
rtp_tip_crosshair_size=Passt die Größe (Länge) des dynamischen Fadenkreuzes an.
rtp_tip_crosshair_color=Passt die Farbe und Deckkraft des dynamischen Fadenkreuzes an.
rtp_tip_toggle_aim=Einmaliges Drücken schaltet das Zielen ein, erneutes Drücken schaltet es wieder aus.
rtp_tip_smart_scope=Wechselt beim Benutzen von Zielfernrohren automatisch zurück in die Ego-Perspektive.
rtp_tip_smart_scope_threshold=Legt den FOV-Schwellenwert fest, unter dem Smart Scope automatisch in die Ego-Perspektive wechselt.
rtp_tip_invert_y=Durch das Bewegen der Maus nach oben neigt sich die Kamera nach unten und umgekehrt.
rtp_tip_classic_mode=Die Blickrichtung der Spielfigur ist jederzeit an die Kamerarichtung gebunden.
